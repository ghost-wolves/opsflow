name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: opsflow
          POSTGRES_USER: opsflow
          POSTGRES_PASSWORD: opsflow_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U opsflow -d opsflow"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/opsflow
      SPRING_DATASOURCE_USERNAME: opsflow
      SPRING_DATASOURCE_PASSWORD: opsflow_dev_password

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run backend tests
        run: ./mvnw test
