services:
  postgres:
    image: postgres:16-alpine
    container_name: opsflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opsflow
      POSTGRES_USER: opsflow
      POSTGRES_PASSWORD: opsflow_dev_password
    ports:
      - "5433:5432"
    volumes:
      - opsflow_postgres_data:/var/lib/postgresql/data

volumes:
  opsflow_postgres_data:
